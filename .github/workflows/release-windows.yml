name: Build and Attach Windows ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 and raylib
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-raylib

      - name: Build release zip
        shell: cmd
        run: build-release.bat

      - name: Upload chess-windows.zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/chess-windows.zip
